<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Center</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-yellow: #d29922;
      --accent-red: #f85149;
      --accent-purple: #a371f7;
      --accent-orange: #f0883e;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      padding: 1rem;
    }
    
    .container { max-width: 1600px; margin: 0 auto; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    h1 { font-size: 1.5rem; font-weight: 600; }
    .last-updated { color: var(--text-muted); font-size: 0.875rem; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }
    
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }
    
    .card.full-width { grid-column: 1 / -1; }
    .card.half-width { grid-column: span 2; }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }
    
    .card-icon { font-size: 1.25rem; }
    
    /* Weather */
    .weather-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    .weather-item {
      background: var(--bg-tertiary);
      padding: 0.75rem;
      border-radius: 6px;
    }
    .weather-location { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
    .weather-temp { font-size: 1.5rem; font-weight: 600; }
    .weather-details { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
    
    /* Snow */
    .snow-table { width: 100%; font-size: 0.875rem; }
    .snow-table th { text-align: left; color: var(--text-secondary); font-weight: 500; padding: 0.5rem 0.25rem; border-bottom: 1px solid var(--border); }
    .snow-table td { padding: 0.5rem 0.25rem; border-bottom: 1px solid var(--border); }
    .snow-value { font-weight: 600; color: var(--accent-blue); }
    .snow-value.fresh { color: var(--accent-green); }
    
    /* Avy Section */
    .avy-columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .avy-column h3 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--border);
    }
    .avy-zone {
      display: flex;
      justify-content: space-between;
      padding: 0.25rem 0;
      font-size: 0.8rem;
    }
    .avy-zone-name { color: var(--text-secondary); }
    .avy-rating { font-weight: 600; }
    .avy-rating.low { color: var(--accent-green); }
    .avy-rating.moderate { color: var(--accent-yellow); }
    .avy-rating.considerable { color: var(--accent-orange); }
    .avy-rating.high { color: var(--accent-red); }
    .avy-rating.extreme { color: #ff0000; }
    .avy-rating.no-rating { color: var(--text-muted); }
    
    /* Avy Problems */
    .avy-problem {
      background: var(--bg-tertiary);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
    }
    .avy-problem-title { font-weight: 600; color: var(--accent-yellow); }
    .avy-problem-desc { color: var(--text-secondary); margin-top: 0.25rem; }
    .advisory-item {
      background: var(--accent-red);
      color: white;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .no-advisory { color: var(--text-muted); font-style: italic; font-size: 0.8rem; }
    
    /* Storm Watch */
    .storm-item {
      background: var(--bg-tertiary);
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }
    .storm-region { font-weight: 600; color: var(--accent-blue); font-size: 0.8rem; }
    .storm-forecast { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    
    /* Social Worthy */
    .social-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .social-item:last-child { border-bottom: none; }
    .social-icon { flex-shrink: 0; }
    
    /* Daily Digest */
    .digest-item {
      display: flex;
      justify-content: space-between;
      padding: 0.35rem 0;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .digest-item:last-child { border-bottom: none; }
    .digest-resort { color: var(--text-secondary); }
    .digest-status { font-weight: 500; }
    .digest-status.match { color: var(--accent-green); }
    .digest-status.mismatch { color: var(--accent-red); }
    
    /* Calendar */
    .calendar-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .calendar-item:last-child { border-bottom: none; }
    .calendar-date { min-width: 45px; text-align: center; }
    .calendar-day { font-size: 1.25rem; font-weight: 600; }
    .calendar-month { font-size: 0.625rem; text-transform: uppercase; color: var(--text-muted); }
    .calendar-event { flex: 1; }
    .calendar-title { font-weight: 500; font-size: 0.875rem; }
    .calendar-time { font-size: 0.75rem; color: var(--text-secondary); }
    
    /* Email */
    .email-item { padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
    .email-item:last-child { border-bottom: none; }
    .email-from { font-weight: 500; font-size: 0.875rem; }
    .email-subject { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-date { font-size: 0.7rem; color: var(--text-muted); }
    
    /* SNOTEL */
    .search-container { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .search-input {
      flex: 1; min-width: 150px; padding: 0.5rem 0.75rem;
      background: var(--bg-tertiary); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-primary); font-size: 0.875rem;
    }
    .search-input:focus { outline: none; border-color: var(--accent-blue); }
    .btn {
      padding: 0.5rem 0.75rem; background: var(--bg-tertiary);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-primary); font-size: 0.75rem;
      cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    .btn:hover { background: var(--border); }
    .search-result { background: var(--bg-tertiary); padding: 0.75rem; border-radius: 6px; font-size: 0.875rem; display: none; }
    .search-result.active { display: block; }
    
    /* Tasks */
    .task-item { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
    .task-item:last-child { border-bottom: none; }
    .task-priority { width: 8px; height: 8px; border-radius: 50%; margin-top: 0.4rem; flex-shrink: 0; }
    .task-priority.high { background: var(--accent-red); }
    .task-priority.medium { background: var(--accent-yellow); }
    .task-priority.low { background: var(--accent-green); }
    .task-text { flex: 1; font-size: 0.8rem; }
    .task-section { margin-top: 0.75rem; }
    .task-section:first-child { margin-top: 0; }
    .task-section-title { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.35rem; font-weight: 600; }
    
    .empty-state { color: var(--text-muted); font-size: 0.875rem; font-style: italic; padding: 1rem 0; text-align: center; }
    
    @media (max-width: 900px) {
      .avy-columns { grid-template-columns: 1fr; }
      .card.half-width { grid-column: span 1; }
    }
    @media (max-width: 640px) {
      body { padding: 0.75rem; }
      .weather-grid { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🍟 Command Center</h1>
      <span class="last-updated">Updated: <span id="update-time">--</span></span>
    </header>
    
    <div class="grid">
      <!-- Row 1: Calendar + Emails + Social Worthy + Reminders -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Calendar</span>
          <span class="card-icon">📅</span>
        </div>
        <div id="calendar-list"></div>
      </div>
      
      <div class="card">
        <div class="card-header">
          <span class="card-title">Needs Reply</span>
          <span class="card-icon">📧</span>
        </div>
        <div id="email-list"></div>
      </div>
      
      <div class="card">
        <div class="card-header">
          <span class="card-title">Social Worthy</span>
          <span class="card-icon">📢</span>
        </div>
        <div id="social-worthy"></div>
      </div>
      
      <div class="card">
        <div class="card-header">
          <span class="card-title">Reminders</span>
          <span class="card-icon">🔔</span>
        </div>
        <div id="reminders-list"></div>
      </div>
      
      <!-- Row 2: Weather + Storm Watch + Snow + Avy Problems + Daily Digest + SNOTEL -->
      <div class="card">
        <div class="card-header">

          <span class="card-icon">🌤️</span>
        </div>
        <div class="weather-grid" id="weather-grid"></div>
      </div>
      
      <div class="card">
        <div class="card-header">
          <span class="card-title">Storm Watch</span>

        </div>
        <div id="storm-watch"></div>
      </div>
      
      <div class="card">

      </div>
      
      <div class="card">
        <div class="card-header">

        </div>
        <div id="avy-problems"></div>
      </div>
      
      <div class="card">
        <div class="card-header">

          <span class="card-icon">📊</span>
        </div>
        <div id="daily-digest"></div>
      </div>
      
      <div class="card">
        <div class="card-header">
          <span class="card-title">SNOTEL Lookup</span>
          <span class="card-icon">🔍</span>
        </div>
        <div class="search-container">
          <input type="text" class="search-input" id="snotel-search" placeholder="Search resort or zone...">

          <a href="https://earth.google.com/web/" target="_blank" class="btn">Google Earth</a>
        </div>
        <div class="search-result" id="snotel-result"></div>
      </div>
      
      <!-- Row 3: Avy Danger (full width) -->
      <div class="card full-width">
        <div class="card-header">
          <span class="card-title">Avalanche Danger</span>
          <span class="card-icon">⚠️</span>
        </div>
        <div class="avy-columns" id="avy-danger"></div>
      </div>
      
      <!-- Row 4: Bugs & To-Do (full width) -->
      <div class="card full-width">
        <div class="card-header">
          <span class="card-title">Bugs & To-Do</span>
          <span class="card-icon">☑️</span>
        </div>
        <div id="tasks-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem;"></div>
      </div>
    </div>
  </div>

    const DASHBOARD_DATA = {"lastUpdated": "Mar 26, 2026 at 08:00 PM MST", "weather": [{"location": "Denver, CO", "icon": "\u26c5", "temp": "+69\u00b0F", "humidity": "H:30%"}, {"location": "Silverton, CO", "icon": "\u26c8", "temp": "+46\u00b0F", "humidity": "H:50%"}, {"location": "Salt Lake City, UT", "icon": "\u26c5", "temp": "+62\u00b0F", "humidity": "H:31%"}, {"location": "Park City, UT", "icon": "\u2600\ufe0f", "temp": "+57\u00b0F", "humidity": "H:53%"}], "snow": [{"resort": "Arapahoe Basin", "snow24": 0, "snow48": 0, "forecast": "Dry"}, {"resort": "Copper Mountain", "snow24": 0, "snow48": 0, "forecast": "Dry"}, {"resort": "Winter Park", "snow24": 0, "snow48": 0, "forecast": "Dry"}, {"resort": "Brighton", "snow24": 0, "snow48": 0, "forecast": "Dry"}, {"resort": "Alta", "snow24": 0, "snow48": 0, "forecast": "Dry"}], "calendar": [{"day": "26", "month": "MAR", "title": "effi@pubgenius.io's birthday", "time": "All day"}], "emails": [], "tasks": {"bugs": [{"text": "Stevens Pass 14d returning 0\" + MMS instead of SMS (flagged to Daniel)", "priority": "high"}, {"text": "UTC timezone bug \u2014 NWS grouping by UTC instead of local timezone (flagged to Daniel)", "priority": "high"}, {"text": "Whistler forecast \"unable to process\" (flagged to Daniel)", "priority": "high"}, {"text": "Top 10 resort list showing 0\" entries \u2014 need 1\" minimum threshold", "priority": "medium"}, {"text": "Forecast window inconsistency \u2014 need consistent 7-day across all resorts/channels", "priority": "medium"}, {"text": "Berthoud Pass avy returning \"outside CAIC forecast areas\" \u2014 incorrect", "priority": "medium"}, {"text": "Snow report indentation inconsistent \u2014 24h flush left, others indented", "priority": "low"}, {"text": "Clickable CAIC link on web chatbot \u2014 currently plain text", "priority": "low"}, {"text": "Intermittent data failures on first query \u2014 timeout/race condition", "priority": "medium"}, {"text": "Paywall message incorrect \u2014 says 7 days sho     function renderUpdateTime() {
      document.getElementById('update-time').textContent = DASHBOARD_DATA.lastUpdated || '--';
    }
    
    function renderWeather() {
      const el = document.getElementById('weather-grid');
      if (!DASHBOARD_DATA.weather?.length) { el.innerHTML = '<div class="empty-state">No weather data</div>'; return; }
      el.innerHTML = DASHBOARD_DATA.weather.map(w => `
        <div class="weather-item">
          <div class="weather-location">${w.location}</div>
          <div class="weather-temp">${w.icon} ${w.temp}</div>
          <div class="weather-details">${w.humidity}</div>
        </div>
      `).join('');
    }
    
    function renderSnow() {
      const el = document.getElementById('snow-tbody');
      if (!DASHBOARD_DATA.snow?.length) { el.innerHTML = '<tr><td colspan="4" class="empty-state">No data</td></tr>'; return; }
      el.innerHTML = DASHBOARD_DATA.snow.map(s => `
        <tr>
          <td>${s.resort}</td>
          <td class="snow-value ${s.snow24 > 0 ? 'fresh' : ''}">${s.snow24}"</td>
          <td class="snow-value ${s.snow48 > 0 ? 'fresh' : ''}">${s.snow48}"</td>
          <td>${s.forecast || '-'}</td>
        </tr>
      `).join('');
    }
    
    function renderAvyDanger() {
      const el = document.getElementById('avy-danger');
      const states = [
        { name: 'Colorado', key: 'colorado', emoji: '🏔️' },
        { name: 'Utah', key: 'utah', emoji: '⛷️' },
        { name: 'California', key: 'california', emoji: '🌲' }
      ];
      el.innerHTML = states.map(state => {
        const zones = DASHBOARD_DATA.avyDanger?.[state.key] || [];
        return `
          <div class="avy-column">
            <h3>${state.emoji} ${state.name}</h3>
            ${zones.length ? zones.map(z => `
              <div class="avy-zone">
                <span class="avy-zone-name">${z.zone}</span>
                <span class="avy-rating ${z.ratingClass}">${z.rating}</span>
              </div>
            `).join('') : '<div class="empty-state">No data</div>'}
          </div>
        `;
      }).join('');
    }
    
    function renderAvyProblems() {
      const el = document.getElementById('avy-problems');
      let html = '';
      
      // Special advisories first
      if (DASHBOARD_DATA.specialAdvisories?.length) {
        html += DASHBOARD_DATA.specialAdvisories.map(a => `<div class="advisory-item">🚨 ${a}</div>`).join('');
      } else {
        html += '<div class="no-advisory">No special advisories active</div>';
      }
      
      // Avy problems
      if (DASHBOARD_DATA.avyProblems?.length) {
        html += DASHBOARD_DATA.avyProblems.map(p => `
          <div class="avy-problem">
            <div class="avy-problem-title">${p.type}</div>
            <div class="avy-problem-desc">${p.description}</div>
          </div>
        `).join('');
      }
      
      el.innerHTML = html || '<div class="empty-state">No problems listed</div>';
    }
    
    function renderStormWatch() {
      const el = document.getElementById('storm-watch');
      if (!DASHBOARD_DATA.stormWatch?.length) { el.innerHTML = '<div class="empty-state">No active storms</div>'; return; }
      el.innerHTML = DASHBOARD_DATA.stormWatch.map(s => `
        <div class="storm-item">
          <div class="storm-region">${s.region}</div>
          <div class="storm-forecast">${s.forecast}</div>
        </div>
      `).join('');
    }
    
    function renderSocialWorthy() {
      const el = document.getElementById('social-worthy');
      if (!DASHBOARD_DATA.socialWorthy?.length) { el.innerHTML = '<div class="empty-state">Nothing flagged</div>'; return; }
      el.innerHTML = DASHBOARD_DATA.socialWorthy.map(s => `
        <div class="social-item">
          <span class="social-icon">${s.icon || '📌'}</span>
          <span>${s.text}</span>
        </div>
      `).join('');
    }
    
    function renderDailyDigest() {
      const el = document.getElementById('daily-digest');
      if (!DASHBOARD_DATA.dailyDigest?.length) { el.innerHTML = '<div class="empty-state">No digest data</div>'; return; }
      el.innerHTML = DASHBOARD_DATA.dailyDigest.map(d => `
        <div class="digest-item">
          <span class="digest-resort">${d.resort}</span>
          <span class="digest-status ${d.match ? 'match' : 'mismatch'}">${d.status}</span>
        </div>
      `).join('');
    }
    
    function renderCalendar() {
      const el = document.getElementById('calendar-list');
      if (!DASHBOARD_DATA.calendar?.length) { el.innerHTML = '<div class="empty-state">No upcoming events</div>'; return; }
      el.innerHTML = DASHBOARD_DATA.calendar.map(e => `
        <div class="calendar-item">
          <div class="calendar-date">
            <div class="calendar-day">${e.day}</div>
            <div class="calendar-month">${e.month}</div>
          </div>
          <div class="calendar-event">
            <div class="calendar-title">${e.title}</div>
            <div class="calendar-time">${e.time}</div>
          </div>
        </div>
      `).join('');
    }
    
    function renderEmails() {
      const el = document.getElementById('email-list');
      if (!DASHBOARD_DATA.emails?.length) { el.innerHTML = '<div class="empty-state">✓ Inbox clear</div>'; return; }
      el.innerHTML = DASHBOARD_DATA.emails.map(e => `
        <div class="email-item">
          <div class="email-from">${e.from}</div>
          <div class="email-subject">${e.subject}</div>
          <div class="email-date">${e.date}</div>
        </div>
      `).join('');
    }
    
    function renderReminders() {
      const el = document.getElementById('reminders-list');
      if (!DASHBOARD_DATA.reminders?.length) { el.innerHTML = '<div class="empty-state">No reminders</div>'; return; }
      el.innerHTML = DASHBOARD_DATA.reminders.map(r => `
        <div class="task-item">
          <div class="task-priority ${r.priority || 'medium'}"></div>
          <div class="task-text">${r.text}${r.due ? `<br><span style="font-size:0.7rem;color:var(--text-muted)">${r.due}</span>` : ''}</div>
        </div>
      `).join('');
    }
    
    function renderTasks() {
      const el = document.getElementById('tasks-list');
      const sections = [
        { key: 'bugs', title: '🐛 Bugs', data: DASHBOARD_DATA.tasks?.bugs },
        { key: 'todos', title: '✅ To-Do', data: DASHBOARD_DATA.tasks?.todos },
        { key: 'waiting', title: '⏳ Waiting On', data: DASHBOARD_DATA.tasks?.waiting }
      ];
      
      el.innerHTML = sections.filter(s => s.data?.length).map(s => `
        <div class="task-section">
          <div class="task-section-title">${s.title}</div>
          ${s.data.map(t => `
            <div class="task-item">
              <div class="task-priority ${t.priority}"></div>
              <div class="task-text">${t.text}</div>
            </div>
          `).join('')}
        </div>
      `).join('') || '<div class="empty-state">No tasks</div>';
    }
    
    // SNOTEL Search
    document.getElementById('snotel-search')?.addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      const result = document.getElementById('snotel-result');
      if (!query) { result.classList.remove('active'); return; }
      const matches = (DASHBOARD_DATA.snotelData || []).filter(s => s.name.toLowerCase().includes(query)).slice(0, 5);
      if (matches.length) {
        result.innerHTML = matches.map(m => `
          <div style="margin-bottom:0.5rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);">
            <strong>${m.name}</strong><br>
            <span style="color:var(--text-secondary);font-size:0.75rem;">
              ${m.lat}, ${m.lon}<br>
              ${m.snotelStation ? `SNOTEL: ${m.snotelStation} (${m.snotelName})` : `Source: ${m.source || 'N/A'}`}
            </span>
          </div>
        `).join('');
      } else {
        result.innerHTML = '<div style="color:var(--text-muted)">No matches</div>';
      }
      result.classList.add('active');
    });
    
    function init() {
      renderUpdateTime();
      renderCalendar();
      renderEmails();
      renderSocialWorthy();
      renderReminders();
      renderWeather();
      renderSnow();
      renderStormWatch();
      renderAvyDanger();
      renderAvyProblems();
      renderDailyDigest();
      renderTasks();
    }
    
    init();
  </script>
</body>
</html>
