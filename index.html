<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Center</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-yellow: #d29922;
      --accent-red: #f85149;
      --accent-purple: #a371f7;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      padding: 1rem;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .last-updated {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1rem;
    }
    
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }
    
    .card-icon {
      font-size: 1.25rem;
    }
    
    /* Weather Section */
    .weather-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    
    .weather-item {
      background: var(--bg-tertiary);
      padding: 0.75rem;
      border-radius: 6px;
    }
    
    .weather-location {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }
    
    .weather-temp {
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    .weather-details {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    
    .weather-forecast {
      font-size: 0.75rem;
      color: var(--accent-blue);
      margin-top: 0.25rem;
    }
    
    /* Snow Conditions */
    .snow-table {
      width: 100%;
      font-size: 0.875rem;
    }
    
    .snow-table th {
      text-align: left;
      color: var(--text-secondary);
      font-weight: 500;
      padding: 0.5rem 0.25rem;
      border-bottom: 1px solid var(--border);
    }
    
    .snow-table td {
      padding: 0.5rem 0.25rem;
      border-bottom: 1px solid var(--border);
    }
    
    .snow-value {
      font-weight: 600;
      color: var(--accent-blue);
    }
    
    .snow-value.fresh {
      color: var(--accent-green);
    }
    
    /* SNOTEL Search */
    .search-container {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 0.75rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.875rem;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--accent-blue);
    }
    
    .btn {
      padding: 0.5rem 0.75rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    
    .btn:hover {
      background: var(--border);
    }
    
    .search-result {
      background: var(--bg-tertiary);
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.875rem;
      display: none;
    }
    
    .search-result.active {
      display: block;
    }
    
    /* Calendar */
    .calendar-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .calendar-item:last-child {
      border-bottom: none;
    }
    
    .calendar-date {
      min-width: 50px;
      text-align: center;
    }
    
    .calendar-day {
      font-size: 1.25rem;
      font-weight: 600;
    }
    
    .calendar-month {
      font-size: 0.625rem;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    
    .calendar-event {
      flex: 1;
    }
    
    .calendar-title {
      font-weight: 500;
    }
    
    .calendar-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    
    .calendar-today {
      background: var(--bg-tertiary);
      margin: -0.5rem -0.5rem;
      padding: 0.5rem;
      border-radius: 6px;
    }
    
    /* Email */
    .email-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .email-item:last-child {
      border-bottom: none;
    }
    
    .email-from {
      font-weight: 500;
      font-size: 0.875rem;
    }
    
    .email-subject {
      font-size: 0.875rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .email-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .email-urgent {
      border-left: 3px solid var(--accent-yellow);
      padding-left: 0.5rem;
    }
    
    /* Cron Outputs */
    .cron-output {
      background: var(--bg-tertiary);
      padding: 0.75rem;
      border-radius: 6px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 0.75rem;
    }
    
    .cron-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
      font-weight: 500;
    }
    
    /* Tasks */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .task-item:last-child {
      border-bottom: none;
    }
    
    .task-priority {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.4rem;
      flex-shrink: 0;
    }
    
    .task-priority.high { background: var(--accent-red); }
    .task-priority.medium { background: var(--accent-yellow); }
    .task-priority.low { background: var(--accent-green); }
    
    .task-text {
      flex: 1;
      font-size: 0.875rem;
    }
    
    .task-section {
      margin-top: 1rem;
    }
    
    .task-section-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    
    /* Full width cards */
    .card.full-width {
      grid-column: 1 / -1;
    }
    
    /* Empty state */
    .empty-state {
      color: var(--text-muted);
      font-size: 0.875rem;
      font-style: italic;
      padding: 1rem 0;
      text-align: center;
    }
    
    /* Mobile adjustments */
    @media (max-width: 640px) {
      body { padding: 0.75rem; }
      .weather-grid { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .search-container { flex-direction: column; }
      .btn { text-align: center; }
    }
  </style>
</head>

    // Render functions
    function renderWeather() {
      const container = document.getElementById('weather-grid');
      if (!DASHBOARD_DATA.weather.length) {
        container.innerHTML = '<div class="empty-state">No weather data</div>';
        return;
      }
      container.innerHTML = DASHBOARD_DATA.weather.map(w => `
        <div class="weather-item">
          <div class="weather-location">${w.location}</div>
          <div class="weather-temp">${w.icon} ${w.temp}</div>
          <div class="weather-details">H: ${w.high} / L: ${w.low} · ${w.humidity}</div>
          ${w.forecast ? `<div class="weather-forecast">${w.forecast}</div>` : ''}
        </div>
      `).join('');
    }
    
    function renderSnow() {
      const tbody = document.getElementById('snow-tbody');
      if (!DASHBOARD_DATA.snow.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No snow data</td></tr>';
        return;
      }
      tbody.innerHTML = DASHBOARD_DATA.snow.map(s => `
        <tr>
          <td>${s.resort}</td>
          <td class="snow-value ${s.snow24 > 0 ? 'fresh' : ''}">${s.snow24}"</td>
          <td class="snow-value ${s.snow48 > 0 ? 'fresh' : ''}">${s.snow48}"</td>
          <td>${s.forecast || '-'}</td>
        </tr>
      `).join('');
    }
    
    function renderCalendar() {
      const container = document.getElementById('calendar-list');
      if (!DASHBOARD_DATA.calendar.length) {
        container.innerHTML = '<div class="empty-state">No upcoming events</div>';
        return;
      }
      container.innerHTML = DASHBOARD_DATA.calendar.map((e, i) => `
        <div class="calendar-item ${i === 0 ? 'calendar-today' : ''}">
          <div class="calendar-date">
            <div class="calendar-day">${e.day}</div>
            <div class="calendar-month">${e.month}</div>
          </div>
          <div class="calendar-event">
            <div class="calendar-title">${e.title}</div>
            <div class="calendar-time">${e.time}</div>
          </div>
        </div>
      `).join('');
    }
    
    function renderEmails() {
      const container = document.getElementById('email-list');
      if (!DASHBOARD_DATA.emails.length) {
        container.innerHTML = '<div class="empty-state">✓ Inbox clear - no replies needed</div>';
        return;
      }
      container.innerHTML = DASHBOARD_DATA.emails.map(e => `
        <div class="email-item ${e.urgent ? 'email-urgent' : ''}">
          <div class="email-from">${e.from}</div>
          <div class="email-subject">${e.subject}</div>
          <div class="email-date">${e.date}</div>
        </div>
      `).join('');
    }
    
    function renderTasks() {
      const container = document.getElementById('tasks-list');
      let html = '';
      
      if (DASHBOARD_DATA.tasks.bugs.length) {
        html += '<div class="task-section"><div class="task-section-title">Bugs</div>';
        html += DASHBOARD_DATA.tasks.bugs.map(t => `
          <div class="task-item">
            <div class="task-priority ${t.priority}"></div>
            <div class="task-text">${t.text}</div>
          </div>
        `).join('');
        html += '</div>';
      }
      
      if (DASHBOARD_DATA.tasks.todos.length) {
        html += '<div class="task-section"><div class="task-section-title">To-Do</div>';
        html += DASHBOARD_DATA.tasks.todos.map(t => `
          <div class="task-item">
            <div class="task-priority ${t.priority}"></div>
            <div class="task-text">${t.text}</div>
          </div>
        `).join('');
        html += '</div>';
      }
      
      if (!html) {
        html = '<div class="empty-state">No tasks</div>';
      }
      
      container.innerHTML = html;
    }
    
    function renderCron() {
      document.getElementById('cron-brief').textContent = DASHBOARD_DATA.cronBrief || 'No data yet';
      document.getElementById('cron-digest').textContent = DASHBOARD_DATA.cronDigest || 'No data yet';
    }
    
    function renderUpdateTime() {
      document.getElementById('update-time').textContent = DASHBOARD_DATA.lastUpdated;
    }
    
    // SNOTEL Search
    const searchInput = document.getElementById('snotel-search');
    const searchResult = document.getElementById('snotel-result');
    
    searchInput.addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      if (!query) {
        searchResult.classList.remove('active');
        return;
      }
      
      const matches = DASHBOARD_DATA.snotelData.filter(s => 
        s.name.toLowerCase().includes(query)
      ).slice(0, 5);
      
      if (matches.length) {
        searchResult.innerHTML = matches.map(m => `
          <div style="margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);">
            <strong>${m.name}</strong><br>
            <span style="color: var(--text-secondary); font-size: 0.75rem;">
              ${m.lat}, ${m.lon}<br>
              ${m.snotelStation ? `SNOTEL: ${m.snotelStation} (${m.snotelName})` : `Source: ${m.source}`}
            </span>
          </div>
        `).join('');
        searchResult.classList.add('active');
      } else {
        searchResult.innerHTML = '<div style="color: var(--text-muted);">No matches found</div>';
        searchResult.classList.add('active');
      }
    });
    
    // Initialize
    function init() {
      renderUpdateTime();
      renderWeather();
      renderSnow();
      renderCalendar();
      renderEmails();
      renderTasks();
      renderCron();
    }
    
    init();
  </script>
